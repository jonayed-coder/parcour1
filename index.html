<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sky Obby 🌤</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Nunito',sans-serif;}
#c{display:block;width:100vw;height:100vh;}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:12px 16px;pointer-events:none;z-index:10;
}
.pill{
  background:rgba(0,0,0,0.6);color:#fff;
  padding:8px 18px;border-radius:999px;font-size:14px;font-weight:800;
  backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;gap:6px;
}
#bankPill{
  position:fixed;top:52px;right:16px;
  background:rgba(20,12,0,0.75);color:#FFD700;
  padding:6px 14px;border-radius:999px;font-size:13px;font-weight:800;
  backdrop-filter:blur(6px);border:1.5px solid rgba(255,200,0,0.4);
  pointer-events:none;z-index:10;
}
#hint{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.85);
  padding:7px 18px;border-radius:999px;font-size:11px;font-weight:700;
  backdrop-filter:blur(6px);pointer-events:none;z-index:10;white-space:nowrap;
  letter-spacing:.3px;
}

/* ── MAIN MENU ── */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;z-index:20;
  background:linear-gradient(160deg,rgba(0,0,0,.88) 0%,rgba(10,0,30,.92) 100%);
  color:#fff;
}
#overlay h1{font-size:58px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;
  text-shadow:0 0 40px rgba(100,200,255,.5);}
.tagline{font-size:15px;color:#aad4ff;margin-bottom:6px;font-weight:700;}
.feat{color:#88ffaa;font-size:12px;margin-bottom:30px;font-weight:700;letter-spacing:.5px;}
.stats{color:#FFD700!important;margin-bottom:22px!important;font-size:16px;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{
  padding:13px 34px;font-size:16px;font-weight:800;
  border:none;border-radius:999px;cursor:pointer;
  font-family:'Nunito',sans-serif;transition:transform .15s,box-shadow .15s;
  margin-top:6px;letter-spacing:.3px;
}
.btn-green{background:linear-gradient(135deg,#00c853,#69f0ae);color:#003318;
  box-shadow:0 4px 24px rgba(0,200,83,.45);}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,200,83,.55);}
.btn-blue{background:linear-gradient(135deg,#1565c0,#42a5f5);color:#fff;
  box-shadow:0 4px 20px rgba(66,165,245,.4);}
.btn-blue:hover{transform:translateY(-2px);}
.btn-blue.active{background:linear-gradient(135deg,#42a5f5,#80d8ff);
  box-shadow:0 0 0 3px #fff,0 4px 20px rgba(66,165,245,.6);}
.btn-gold{background:linear-gradient(135deg,#f9a825,#ffee58);color:#3e2000;
  box-shadow:0 4px 20px rgba(249,168,37,.4);}
.btn-gold:hover{transform:translateY(-2px);}

/* ── POPUP MESSAGES ── */
#cpmsg,#djmsg{
  position:fixed;left:50%;transform:translate(-50%,-50%);
  border-radius:12px;font-size:17px;font-weight:800;
  z-index:100;pointer-events:none;display:none;padding:10px 24px;
}
#cpmsg{top:38%;background:rgba(0,255,136,.92);color:#003322;}
#djmsg{top:32%;background:rgba(120,80,255,.92);color:#fff;}
@keyframes floatUp{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  70%{opacity:1;transform:translate(-50%,-115%) scale(1.07);}
  100%{opacity:0;transform:translate(-50%,-175%) scale(.9);}
}

/* ── SHOP ── */
#shopOverlay{
  position:fixed;inset:0;z-index:25;
  background:linear-gradient(160deg,rgba(0,0,0,.94) 0%,rgba(5,0,20,.96) 100%);
  display:none;flex-direction:column;align-items:center;
  padding:24px 16px;overflow-y:auto;
}
#shopOverlay.show{display:flex;}
#shopOverlay h2{color:#FFD700;font-size:32px;font-weight:900;margin-bottom:4px;}
.shopBank{color:#88ffaa;font-size:15px;font-weight:800;margin-bottom:22px;}
.charGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;width:100%;max-width:820px;}
.charCard{
  background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
  border-radius:16px;padding:16px 10px 12px;display:flex;flex-direction:column;
  align-items:center;gap:8px;transition:border-color .2s,transform .15s;cursor:pointer;
}
.charCard:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.3);}
.charCard.owned{border-color:rgba(0,255,136,.5);background:rgba(0,255,136,.07);}
.charCard.selected{border-color:#FFD700;background:rgba(255,215,0,.1);
  box-shadow:0 0 20px rgba(255,215,0,.25);}
/* Mini roblox-style avatar preview */
.avatar{width:64px;height:80px;position:relative;margin-bottom:4px;}
.av-head{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:34px;height:32px;border-radius:6px;}
.av-hair{position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:38px;height:14px;border-radius:4px 4px 0 0;}
.av-body{position:absolute;top:30px;left:50%;transform:translateX(-50%);
  width:30px;height:22px;border-radius:4px;}
.av-jacket{position:absolute;top:30px;left:50%;transform:translateX(-50%);
  width:38px;height:22px;border-radius:4px;opacity:.85;}
.av-larm,.av-rarm{position:absolute;top:31px;width:10px;height:20px;border-radius:3px;}
.av-larm{left:2px;}.av-rarm{right:2px;}
.av-lpant,.av-rpant{position:absolute;top:50px;width:13px;height:18px;border-radius:3px;}
.av-lpant{left:50%;transform:translateX(-70%);}.av-rpant{left:50%;transform:translateX(-30%);}
.av-lshoe,.av-rshoe{position:absolute;top:66px;width:14px;height:7px;border-radius:2px;}
.av-lshoe{left:50%;transform:translateX(-80%);}.av-rshoe{left:50%;transform:translateX(-20%);}
.charName{color:#fff;font-size:13px;font-weight:800;text-align:center;}
.charPrice{color:#FFD700;font-size:12px;font-weight:800;}
.charBtn{
  padding:6px 16px;border-radius:999px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;
  transition:transform .1s;
}
.charBtn:hover{transform:scale(1.05);}
.charBtn.buy{background:#f9a825;color:#3e2000;}
.charBtn.select{background:#42a5f5;color:#fff;}
.charBtn.selected{background:#FFD700;color:#3e2000;}
.charBtn.cantbuy{background:#444;color:#888;cursor:not-allowed;}
#shopClose{margin-top:20px;}

/* ── MOBILE CONTROLS ── */
#mobileControls{display:none;}
#mobileControls.show{display:block;}
#joyZone{
  position:fixed;left:20px;bottom:24px;
  width:136px;height:136px;border-radius:50%;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.28);
  touch-action:none;z-index:30;
}
#joyKnob{
  position:absolute;width:54px;height:54px;border-radius:50%;
  background:rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.9);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
}
#jumpBtn{
  position:fixed;right:28px;bottom:36px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(0,210,80,.82);border:3px solid rgba(255,255,255,.55);
  font-size:28px;color:#fff;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  touch-action:none;z-index:30;user-select:none;
  font-family:'Nunito',sans-serif;transition:background .1s,transform .1s;
}
#jumpBtn:active{background:rgba(0,255,110,.95);transform:scale(.91);}
#respawnBtn{
  position:fixed;right:124px;bottom:50px;
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,90,40,.82);border:2px solid rgba(255,255,255,.4);
  font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;
  touch-action:none;z-index:30;user-select:none;
}
#camZone{
  position:fixed;right:0;top:0;
  width:50vw;height:calc(100vh - 155px);
  touch-action:none;z-index:28;
}
</style>
</head>

function mkPlayer(){
  if(pg) scene.remove(pg);
  pg=new THREE.Group();
  const C=CHARS[save.sel].c;
  const mat=c=>new THREE.MeshLambertMaterial({color:c});
  const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
  const sphere=(r,ws,hs)=>new THREE.SphereGeometry(r,ws||12,hs||10);

  pBody=new THREE.Mesh(box(PW,.62,PD),mat(C.jacket||C.body));
  pBody.position.y=0; pg.add(pBody);

  // Jacket layer
  if(C.jacket){
    const jk=new THREE.Mesh(box(PW+.12,.62,PD+.04),mat(C.jacket));
    jk.position.y=0; pg.add(jk);
    // shirt visible below jacket
    const sh=new THREE.Mesh(box(PW-.04,.3,PD+.06),mat(C.body));
    sh.position.set(0,-.05,0); pg.add(sh);
  }

  pHead=new THREE.Mesh(sphere(.34),mat(C.skin));
  pHead.scale.set(1,1.08,1); pHead.position.y=.62; pg.add(pHead);

  const hair=new THREE.Mesh(box(.68,.15,.64),mat(C.hair));
  hair.position.set(0,.93,-.02); pg.add(hair);
  const fringe=new THREE.Mesh(box(.52,.11,.2),mat(C.hair));
  fringe.position.set(0,.88,.26); pg.add(fringe);

  const eyeM=mat(0x111111),whM=mat(0xffffff);
  const eG=new THREE.SphereGeometry(.065,6,6);
  const wG=new THREE.SphereGeometry(.09,6,6);
  [-1,1].forEach(s=>{

    const w=new THREE.Mesh(wG,whM);  w.position.set(s*.12,.665,.295); w.scale.set(1,1,.5); pg.add(w);
  });
  const smile=new THREE.Mesh(box(.16,.04,.06),eyeM);
  smile.position.set(0,.52,.33); pg.add(smile);

  const earG=new THREE.SphereGeometry(.09,6,6);
  [-1,1].forEach(s=>{
    const ear=new THREE.Mesh(earG,mat(C.skin));
    ear.position.set(s*.34,.62,0); ear.scale.set(.45,1,.7); pg.add(ear);

  const rArm=new THREE.Mesh(armG,mat(C.skin)); rArm.position.set( .5,.06,0); pg.add(rArm);

  scene.add(pg);

// ━━━━━━━━━━━━━━ COLLISION ━━━━━━━━━━━━━━
// Overlap check — exact same tolerances as original working version
function ov(px,py,pz,pl){
  const p=pl.mesh.position;
  return Math.abs(px-p.x)<(PW+pl.w)/2-.01
      && Math.abs(py-p.y)<(PH+pl.h)/2-.01
      && Math.abs(pz-p.z)<(PD+pl.d)/2-.01;
}

function resolveY(dt){
  pg.position.y+=vel.y*dt;
  for(const pl of platforms){
    if(pl.fallen) continue;
    if(!ov(pg.position.x,pg.position.y,pg.position.z,pl)) continue;
    const p=pl.mesh.position;
    if(vel.y<=0.05){
      pg.position.y=p.y+pl.h/2+PH/2;
      vel.y=0; onGround=true; dblJumped=false; standPlat=pl;
      if(pl.type==='bouncy'){vel.y=JUMP*1.8;onGround=false;standPlat=null;}
      if(pl.type==='falling'&&!pl.act) pl.act=true;
      if(pl.type==='checkpoint'&&!pl.act){
        pl.act=true;
        checkpoint={x:p.x,y:p.y+pl.h/2+PH/2+.5,z:p.z};
        showCpMsg();
      }
      if(pl.type==='finish') onFinish();
    } else {pg.position.y=p.y-pl.h/2-PH/2;vel.y=-1;}
  }
}

// KEY FIX: skip x/z push if player is clearly standing ON TOP of this platform
function resolveX(dt){
  pg.position.x+=mx*dt;
  for(const pl of platforms){
    if(pl.fallen) continue;
    if(!ov(pg.position.x,pg.position.y,pg.position.z,pl)) continue;
    const p=pl.mesh.position;
    // Player bottom near platform top → on top, don't push sideways
    if((pg.position.y-PH/2)>=(p.y+pl.h/2-.12)) continue;
    pg.position.x=pg.position.x>p.x?p.x+pl.w/2+PW/2:p.x-pl.w/2-PW/2;
  }
}
function resolveZ(dt){
  pg.position.z+=mz*dt;
  for(const pl of platforms){
    if(pl.fallen) continue;
    if(!ov(pg.position.x,pg.position.y,pg.position.z,pl)) continue;
    const p=pl.mesh.position;
    if((pg.position.y-PH/2)>=(p.y+pl.h/2-.12)) continue;
    pg.position.z=pg.position.z>p.z?p.z+pl.d/2+PD/2:p.z-pl.d/2-PD/2;
  }
}

function onFinish(){
  if(state!=='playing') return;
  // Bank the coins earned
  save.bank+=gotCoins; persist(); updateBankUI();
  const isLast=curLv>=LEVELS.length-1;
  state=isLast?'win':'complete';
  const ov2=document.getElementById('overlay');
  ov2.style.display='flex';
  ov2.innerHTML=isLast
    ?`<h1>🏆 You Win!</h1>
      <p class="tagline">All 5 worlds complete!</p>
      <p class="stats">⏱ ${timer.toFixed(1)}s &nbsp;·&nbsp; 🪙 +${gotCoins} coins</p>
      <div class="btn-row">
        <button class="btn btn-green" id="sbtn">▶ Play Again</button>
        <button class="btn btn-gold"  id="shopbtn">🛒 Shop</button>
        <button class="btn btn-blue${mobileMode?' active':''}" id="mbtn">📱 ${mobileMode?'ON':'Mobile'}</button>
      </div>`
    :`<h1>🎉 Level Clear!</h1>
      <p class="tagline">${LEVELS[curLv+1].name} unlocked!</p>
      <p class="stats">⏱ ${timer.toFixed(1)}s &nbsp;·&nbsp; 🪙 +${gotCoins} coins</p>
      <div class="btn-row">
        <button class="btn btn-green" id="sbtn">Next World →</button>
        <button class="btn btn-gold"  id="shopbtn">🛒 Shop</button>
        <button class="btn btn-blue${mobileMode?' active':''}" id="mbtn">📱 ${mobileMode?'ON':'Mobile'}</button>
      </div>`;
  bindMenuBtns(isLast);
}

function bindMenuBtns(isLast){
  const sb=document.getElementById('sbtn');
  const gb=document.getElementById('shopbtn');
  const mb=document.getElementById('mbtn');
  if(sb) sb.onclick=()=>{document.getElementById('overlay').style.display='none';loadLv(isLast?0:curLv+1);};
  if(gb) gb.onclick=openShop;
  if(mb) mb.onclick=toggleMobile;
}

function respawn(){
  pg.position.set(checkpoint.x,checkpoint.y,checkpoint.z);
  vel={x:0,y:0,z:0};onGround=false;dblJumped=false;standPlat=null;
  for(const pl of platforms){
    if(pl.type==='falling'){
      pl.act=false;pl.fallen=false;pl.fTimer=0;
      pl.mesh.visible=true;pl.mesh.position.set(pl.bx,pl.by,pl.bz);
    }
  }
}

// ━━━━━━━━━━━━━━ CHARACTER SHOP ━━━━━━━━━━━━━━
function openShop(){
  document.getElementById('overlay').style.display='none';
  updateBankUI();
  buildShopGrid();
  document.getElementById('shopOverlay').classList.add('show');
}
function closeShop(){
  document.getElementById('shopOverlay').classList.remove('show');
  document.getElementById('overlay').style.display='flex';
}

function buildShopGrid(){
  const grid=document.getElementById('charGrid');
  grid.innerHTML='';
  CHARS.forEach((ch,i)=>{
    const owned=save.owned.includes(i);
    const selected=save.sel===i;
    const C=ch.c;
    const card=document.createElement('div');
    card.className='charCard'+(selected?' selected':owned?' owned':'');
    card.innerHTML=`
      <div class="avatar">
        <div class="av-hair"  style="background:#${C.hair.toString(16).padStart(6,'0')}"></div>
        <div class="av-head"  style="background:#${C.skin.toString(16).padStart(6,'0')}"></div>
        ${C.jacket?`<div class="av-jacket" style="background:#${C.jacket.toString(16).padStart(6,'0')}"></div>`:''}
        <div class="av-body"  style="background:#${C.body.toString(16).padStart(6,'0')}"></div>
        <div class="av-larm"  style="background:#${C.skin.toString(16).padStart(6,'0')}"></div>
        <div class="av-rarm"  style="background:#${C.skin.toString(16).padStart(6,'0')}"></div>
        <div class="av-lpant" style="background:#${C.pants.toString(16).padStart(6,'0')}"></div>
        <div class="av-rpant" style="background:#${C.pants.toString(16).padStart(6,'0')}"></div>
        <div class="av-lshoe" style="background:#${C.shoe.toString(16).padStart(6,'0')}"></div>
        <div class="av-rshoe" style="background:#${C.shoe.toString(16).padStart(6,'0')}"></div>
      </div>
      <div class="charName">${ch.name}</div>
      <div class="charPrice">${ch.price===0?'FREE':'🪙 '+ch.price}</div>`;

    let btnTxt,btnCls;
    if(selected){btnTxt='✓ Equipped';btnCls='selected';}
    else if(owned){btnTxt='Equip';btnCls='select';}
    else if(save.bank>=ch.price){btnTxt='Buy';btnCls='buy';}
    else{btnTxt='🔒 '+ch.price;btnCls='cantbuy';}

    const btn=document.createElement('button');
    btn.className='charBtn '+btnCls;
    btn.textContent=btnTxt;
    btn.onclick=()=>charAction(i);
    card.appendChild(btn);
    grid.appendChild(card);
  });
}

function charAction(i){
  const ch=CHARS[i];
  const owned=save.owned.includes(i);
  if(save.sel===i) return;
  if(!owned){
    if(save.bank<ch.price) return;
    save.bank-=ch.price;
    save.owned.push(i);
  }
  save.sel=i;
  persist(); updateBankUI();
  mkPlayer(); // rebuild with new character
  buildShopGrid();
}

// ━━━━━━━━━━━━━━ MOBILE TOGGLE ━━━━━━━━━━━━━━
function toggleMobile(){
  mobileMode=!mobileMode;
  document.getElementById('mobileControls').classList.toggle('show',mobileMode);
  document.getElementById('hint').style.display=mobileMode?'none':'';
  document.querySelectorAll('#mbtn').forEach(b=>{
    b.classList.toggle('active',mobileMode);
    b.textContent=mobileMode?'📱 ON':'📱 Mobile';
  });
}

// ━━━━━━━━━━━━━━ INPUT ━━━━━━━━━━━━━━
function doJump(){
  if(onGround){vel.y=JUMP;onGround=false;}
  else if(!dblJumped){vel.y=JUMP*.88;dblJumped=true;showDjMsg();}
}
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '&&state==='playing'){e.preventDefault();doJump();}
  if(e.key.toLowerCase()==='r') respawn();
});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener('mousedown',e=>{if(!mobileMode){mDown=true;mX=e.clientX;}e.preventDefault();});
document.addEventListener('mousemove',e=>{if(mDown&&!mobileMode){camYaw+=(e.clientX-mX)*.006;mX=e.clientX;}});
document.addEventListener('mouseup',()=>mDown=false);

// Joystick
const joyZone=document.getElementById('joyZone');
const joyKnob=document.getElementById('joyKnob');
const JOY_R=55;
function updateJoy(t){
  const r=joyZone.getBoundingClientRect();
  let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>JOY_R){dx=dx/dist*JOY_R;dy=dy/dist*JOY_R;}
  joyKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  joyDx=dx/JOY_R; joyDz=dy/JOY_R;
}
joyZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joyId=t.identifier;joyActive=true;updateJoy(t);},{passive:false});
joyZone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===joyId){updateJoy(t);break;}},{passive:false});
joyZone.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===joyId){joyActive=false;joyId=null;joyDx=0;joyDz=0;joyKnob.style.transform='translate(-50%,-50%)';break;}},{passive:false});
joyZone.addEventListener('touchcancel',()=>{joyActive=false;joyId=null;joyDx=0;joyDz=0;joyKnob.style.transform='translate(-50%,-50%)';},{passive:false});

document.getElementById('jumpBtn').addEventListener('touchstart',e=>{e.preventDefault();if(state==='playing')doJump();},{passive:false});
document.getElementById('respawnBtn').addEventListener('touchstart',e=>{e.preventDefault();respawn();},{passive:false});

const camZone=document.getElementById('camZone');
let camTId=null,camTX=0;
camZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];camTId=t.identifier;camTX=t.clientX;},{passive:false});
camZone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===camTId){camYaw+=(t.clientX-camTX)*.007;camTX=t.clientX;break;}},{passive:false});
camZone.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===camTId){camTId=null;break;}},{passive:false});

// ━━━━━━━━━━━━━━ UPDATE LOOP ━━━━━━━━━━━━━━
function update(dt){
  if(state!=='playing') return;
  timer+=dt; elapsed+=dt;
  document.getElementById('tm').textContent=`⏱ ${timer.toFixed(1)}s`;

  // Movement vector
  mx=0; mz=0;
  if(mobileMode&&joyActive){
    // joyDx=+1 → right (D), joyDz=-1 → forward (W)
    mx = joyDx*Math.cos(camYaw) + joyDz*Math.sin(camYaw);
    mz = -joyDx*Math.sin(camYaw) + joyDz*Math.cos(camYaw);
  } else {
    if(keys['w']||keys['arrowup'])    {mx-=Math.sin(camYaw);mz-=Math.cos(camYaw);}
    if(keys['s']||keys['arrowdown'])  {mx+=Math.sin(camYaw);mz+=Math.cos(camYaw);}
    if(keys['a']||keys['arrowleft'])  {mx-=Math.cos(camYaw);mz+=Math.sin(camYaw);}
    if(keys['d']||keys['arrowright']) {mx+=Math.cos(camYaw);mz-=Math.sin(camYaw);}
  }
  const len=Math.sqrt(mx*mx+mz*mz);
  if(len>0){mx=mx/len*SPEED;mz=mz/len*SPEED;}

  // Player rotation
  if(len>.1){
    const ta=Math.atan2(mx,mz);
    let da=ta-pg.rotation.y;
    while(da>Math.PI)da-=Math.PI*2;
    while(da<-Math.PI)da+=Math.PI*2;
    pg.rotation.y+=da*.22;
  }

  // Animations
  const lArm=pg.userData.lArm,rArm=pg.userData.rArm;
  if(len>.1&&onGround){
    const sw=Math.sin(elapsed*14)*.38;
    pLLeg.rotation.x=sw;pRLeg.rotation.x=-sw;
    if(lArm){lArm.rotation.x=-sw*.7;rArm.rotation.x=sw*.7;}
  } else if(!onGround){
    pLLeg.rotation.x=.35;pRLeg.rotation.x=.35;
    if(lArm){lArm.rotation.x=-.3;rArm.rotation.x=-.3;}
  } else {
    pLLeg.rotation.x*=.75;pRLeg.rotation.x*=.75;
    if(lArm){lArm.rotation.x*=.75;rArm.rotation.x*=.75;}
  }
  pHead.position.y=.62+(onGround&&len>.1?Math.abs(Math.sin(elapsed*14))*.045:0);

  // ── Moving platform carry ──
  // 1) Save prev pos and move platforms
  for(const pl of platforms){
    pl.prev.copy(pl.mesh.position);
    if(pl.type==='moving'&&pl.mx){
      const off=Math.sin(elapsed*pl.ms+pl.mo)*pl.mr;
      if(pl.mx==='x')pl.mesh.position.x=pl.bx+off;
      if(pl.mx==='y')pl.mesh.position.y=pl.by+off;
      if(pl.mx==='z')pl.mesh.position.z=pl.bz+off;
    }
    if(pl.type==='falling'&&pl.act&&!pl.fallen){
      pl.fTimer+=dt;
      pl.mesh.position.x=pl.bx+Math.sin(pl.fTimer*28)*Math.min(pl.fTimer/pl.fd,1)*.09;
      if(pl.fTimer>=pl.fd){pl.fallen=true;pl.mesh.visible=false;}
    }
  }
  // 2) Carry player using THIS frame's standPlat delta (platform moved, now move player)
  if(standPlat&&standPlat.type==='moving'&&!standPlat.fallen){
    const dp=standPlat.mesh.position.clone().sub(standPlat.prev);
    pg.position.add(dp);
  }

  // 3) Physics + collision (resets standPlat)
  onGround=false; standPlat=null;
  vel.y+=G*dt; vel.y=Math.max(vel.y,-32);
  resolveY(dt); resolveX(dt); resolveZ(dt);

  // Coins
  for(const co of coins){
    if(co.got)continue;
    co.mesh.rotation.y+=dt*3;
    const dx=pg.position.x-co.x,dy=pg.position.y-co.y,dz=pg.position.z-co.z;
    if(dx*dx+dy*dy+dz*dz<1.6){
      co.got=true;co.mesh.visible=false;gotCoins++;
      document.getElementById('cn').textContent=`🪙 ${gotCoins}/${totCoins}`;
    }
  }

  // Stars
  for(const st of starMeshes){st.rotation.y+=dt*2.2;st.rotation.x+=dt*.7;}

  // Death
  if(pg.position.y<LEVELS[curLv].deathY) respawn();

  // Camera — lock tight to player
  const cx=pg.position.x+Math.sin(camYaw)*CAM_D;
  const cy=pg.position.y+CAM_H;
  const cz=pg.position.z+Math.cos(camYaw)*CAM_D;
  const snap=1-Math.pow(0.002,dt);
  camera.position.x+=(cx-camera.position.x)*snap;
  camera.position.y+=(cy-camera.position.y)*snap;
  camera.position.z+=(cz-camera.position.z)*snap;
  camera.lookAt(pg.position.x,pg.position.y+.6,pg.position.z);
}

function animate(ts){
  requestAnimationFrame(animate);
  const dt=Math.min((ts-lastTS)/1000,.05);
  lastTS=ts;
  if(dt>0)update(dt);
  renderer.render(scene,camera);
}

// ━━━━━━━━━━━━━━ INIT ━━━━━━━━━━━━━━
mkPlayer();
camera.position.set(0,8,13);
updateBankUI();

document.getElementById('sbtn').onclick=()=>{
  document.getElementById('overlay').style.display='none';
  loadLv(0);
};
document.getElementById('shopbtn').onclick=openShop;
document.getElementById('mbtn').onclick=toggleMobile;

requestAnimationFrame(animate);
</script>
